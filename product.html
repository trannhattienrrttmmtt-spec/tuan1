<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi Tiết Sản Phẩm — Apple Store VN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:   #0a0a0a;
      --accent:    #0071e3;
      --accent2:   #bf4800;
      --surface:   #ffffff;
      --muted:     #f5f5f7;
      --text:      #1d1d1f;
      --text-soft: #6e6e73;
      --radius:    18px;
      --shadow:    0 4px 32px rgba(0,0,0,.08);
    }

    body { background: var(--muted); font-family: 'Jost', sans-serif; color: var(--text); margin: 0; }
    a { text-decoration: none; color: inherit; }

    /* ── Header ── */
    .site-header {
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 40px 0;
      text-align: center;
    }
    .site-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; }
    .site-header h1 span { color: var(--accent); }

    /* ── Nav ── */
    .site-nav { background: rgba(10,10,10,.95); padding: 5px 0; }
    .site-nav .nav-link { color: rgba(255,255,255,.6) !important; font-size: .9rem; padding: 0.5rem 1.5rem !important; }
    .site-nav .nav-link.active { color: #fff !important; }

    /* ── Breadcrumb ── */
    .breadcrumb-bar { background: #fff; border-bottom: 1px solid #e5e5ea; padding: 12px 0; font-size: 0.85rem; }
    .breadcrumb-bar a { color: var(--accent); }
    .breadcrumb-bar .sep { margin: 0 8px; color: #ccc; }

    /* ── Detail Card ── */
    .detail-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin-top: 30px;
      overflow: hidden;
    }
    @media (max-width: 850px) { .detail-card { grid-template-columns: 1fr; } }

    .detail-card__gallery {
      background: #fbfbfd;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }
    .detail-card__gallery img { max-width: 100%; height: auto; transition: transform 0.5s; }
    .detail-card__gallery:hover img { transform: scale(1.05); }

    .detail-card__info { padding: 50px; }
    .detail-card__category { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-soft); letter-spacing: 1px; }
    .detail-card__name { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin: 10px 0; }
    .detail-card__price-block { margin: 20px 0; }
    .detail-card__price { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .detail-card__price-old { text-decoration: line-through; color: #999; margin-left: 15px; }

    .detail-card__desc { font-size: 15px; line-height: 1.7; color: var(--text-soft); margin-bottom: 30px; }

    /* Specs Grid */
    .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .spec-item__label { font-size: 11px; text-transform: uppercase; color: #aaa; font-weight: 700; display: block; }
    .spec-item__value { font-size: 14px; font-weight: 500; }

    /* Buttons */
    .btn-buy { background: var(--accent); color: #fff; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 600; width: 100%; margin-bottom: 10px; transition: 0.3s; }
    .btn-buy:hover { background: #0077ed; transform: translateY(-2px); }
    .btn-back { color: var(--accent); display: inline-flex; align-items: center; margin-bottom: 20px; font-weight: 500; }

    /* Footer */
    footer { background: var(--primary); color: #fff; padding: 60px 0; text-align: center; margin-top: 60px; }
    .footer-bottom { opacity: 0.4; font-size: 12px; margin-top: 30px; }

    /* Color Picker */
    .color-picker { display: flex; gap: 10px; margin: 15px 0 30px; }
    .color-option { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #eee; cursor: pointer; }
    .color-option.active { border-color: var(--accent); transform: scale(1.2); }
  </style>
</head>
<body>

  <header class="site-header">
    <h1><span>Apple</span> Store</h1>
  </header>

  <nav class="site-nav navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <div class="collapse navbar-collapse justify-content-center">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">iPhone</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Chi tiết sản phẩm</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Cửa hàng</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="breadcrumb-bar">
    <div class="container">
      <a href="index.html">Trang chủ</a> <span class="sep">›</span> <span id="breadcrumb-name">Đang tải...</span>
    </div>
  </div>

  <main class="container">
    <div id="product-container">
      </div>
  </main>

  <footer>
    <div class="container">
      <p>Apple Store Việt Nam - Trải nghiệm mua sắm đẳng cấp.</p>
      <div class="footer-bottom">© 2026 Apple Store VN. All rights reserved.</div>
    </div>
  </footer>

  <script>
    // Dữ liệu sản phẩm (Đảm bảo đồng nhất với index.html)
    const products = {
      sp1: {
        name: 'iPhone 17 Pro',
        category: 'iPhone 17 Series',
        badge: 'Mới nhất',
        price: '33.990.000 ₫',
        priceOld: '36.990.000 ₫',
        image: 'iPhone-17-Pro-bac-1-600x600.png',
        desc: 'iPhone 17 Pro sở hữu khung Titan mới, chip A19 Pro siêu mạnh mẽ và hệ thống camera 48MP đột phá, mang lại trải nghiệm đỉnh cao nhất.',
        colors: ['#e8e3d6', '#0a0a0a', '#3d5c45'],
        specs: [
          { label: 'Vi xử lý', value: 'Apple A19 Pro (3nm)' },
          { label: 'Màn hình', value: '6.3 inch Super Retina XDR' },
          { label: 'Bộ nhớ', value: '256GB / 512GB / 1TB' },
          { label: 'Pin', value: 'Sử dụng lên đến 28 giờ' }
        ]
      },
      sp2: {
        name: 'iPhone 17 Pro Max',
        category: 'iPhone 17 Series',
        badge: 'Hot',
        price: '39.990.000 ₫',
        priceOld: '42.990.000 ₫',
        image: '2_result_42e134ba7ed448198a020e3016f4dee7_master.png',
        desc: 'Màn hình 6.9 inch cực đại, pin dung lượng lớn nhất từ trước đến nay cùng khả năng zoom quang học 5x sắc nét.',
        colors: ['#f4a460', '#0a0a0a', '#e8e3d6'],
        specs: [
          { label: 'Vi xử lý', value: 'Apple A19 Pro (3nm)' },
          { label: 'Màn hình', value: '6.9 inch Super Retina XDR' },
          { label: 'Bộ nhớ', value: '256GB / 512GB / 1TB' },
          { label: 'Pin', value: 'Sử dụng lên đến 33 giờ' }
        ]
      },
      sp3: {
        name: 'iPhone 15 Pro',
        category: 'iPhone 15 Series',
        badge: 'Giảm giá',
        price: '24.990.000 ₫',
        priceOld: '29.990.000 ₫',
        image: 'images.png',
        desc: 'Thiết kế Titan bền bỉ, chip A17 Pro mạnh mẽ và cổng sạc USB-C tiện dụng.',
        colors: ['#c8b99a', '#0a0a0a'],
        specs: [
          { label: 'Vi xử lý', value: 'Apple A17 Pro' },
          { label: 'Màn hình', value: '6.1 inch 120Hz' },
          { label: 'Bộ nhớ', value: '128GB / 256GB' },
          { label: 'Cổng sạc', value: 'USB-C 3.0' }
        ]
      },
      sp4: {
        name: 'iPhone 14 Pro Max',
        category: 'iPhone 14 Series',
        badge: 'Bán chạy',
        price: '19.990.000 ₫',
        priceOld: '24.990.000 ₫',
        image: '444965480.png',
        desc: 'Dynamic Island thay đổi cách bạn tương tác với iPhone, cùng màn hình Always-On vô cùng tiện lợi.',
        colors: ['#5c4f6f', '#0a0a0a'],
        specs: [
          { label: 'Vi xử lý', value: 'Apple A16 Bionic' },
          { label: 'Màn hình', value: '6.7 inch Super Retina' },
          { label: 'Tính năng', value: 'Dynamic Island' },
          { label: 'Camera', value: '48MP chính' }
        ]
      }
    };

    // Lấy ID từ URL
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = products[productId];
    const container = document.getElementById('product-container');

    if (product) {
      document.getElementById('breadcrumb-name').textContent = product.name;
      
      const specsHTML = product.specs.map(s => `
        <div class="spec-item">
          <span class="spec-item__label">${s.label}</span>
          <span class="spec-item__value">${s.value}</span>
        </div>
      `).join('');

      const colorsHTML = product.colors.map((c, i) => `
        <div class="color-option ${i===0?'active':''}" style="background:${c}"></div>
      `).join('');

      container.innerHTML = `
        <div class="detail-card">
          <div class="detail-card__gallery">
            <img src="images/${product.image}" alt="${product.name}">
          </div>
          <div class="detail-card__info">
            <a href="index.html" class="btn-back">← Quay lại cửa hàng</a>
            <span class="detail-card__category">${product.category}</span>
            <h1 class="detail-card__name">${product.name}</h1>
            <div class="detail-card__price-block">
              <span class="detail-card__price">${product.price}</span>
              <span class="detail-card__price-old">${product.priceOld}</span>
            </div>
            <p class="detail-card__desc">${product.desc}</p>
            
            <span class="spec-item__label">Chọn màu sắc</span>
            <div class="color-picker">${colorsHTML}</div>

            <div class="specs">${specsHTML}</div>
            
            <button class="btn-buy">MUA NGAY</button>
            <p style="text-align:center; font-size:12px; color:#999;">Giao hàng miễn phí toàn quốc trong 2-3 ngày</p>
          </div>
        </div>
      `;
    } else {
      container.innerHTML = `<div style="padding:100px; text-align:center;"><h2>Sản phẩm không tồn tại!</h2><a href="index.html">Quay về trang chủ</a></div>`;
    }
  </script>
</body>
</html>
